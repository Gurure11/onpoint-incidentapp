<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Fuel Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header/Navigation */
        .header {
            background: white;
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header h1 {
            color: #333;
            font-size: 1.8em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .nav-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .nav-btn.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .nav-btn.secondary {
            background: #f0f0f0;
            color: #333;
        }

        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* Tab Navigation */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: white;
            padding: 15px;
            border-radius: 50px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .tab {
            flex: 1;
            padding: 15px 25px;
            border: none;
            border-radius: 40px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            background: transparent;
            color: #666;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .tab:hover:not(.active) {
            background: #f0f0f0;
        }

        /* Dashboard Content */
        .dashboard-content {
            display: block;
        }

        .form-content {
            display: none;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            border-left: 5px solid #667eea;
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-title {
            color: #666;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #333;
        }

        .stat-value small {
            font-size: 0.5em;
            color: #999;
        }

        /* Table Styles */
        .table-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            overflow: auto;
            max-height: 600px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1800px;
        }

        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 12px;
            font-weight: 600;
            font-size: 0.85em;
            text-transform: uppercase;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            color: #555;
            font-size: 0.9em;
        }

        tr:hover {
            background-color: #f8f9ff;
        }

        tr:nth-child(even) {
            background-color: #fafafa;
        }

        .drive-link {
            color: #667eea;
            text-decoration: none;
            font-size: 0.85em;
        }

        .drive-link:hover {
            text-decoration: underline;
        }

        /* Form Styles */
        .form-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .form-title {
            font-size: 1.8em;
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 0.95em;
        }

        .form-group label span {
            color: #e53e3e;
            margin-left: 4px;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        select.form-control {
            cursor: pointer;
            background-color: white;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .calculated-field {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
        }

        .calculated-field label {
            color: #666;
            margin-bottom: 5px;
        }

        .calculated-field .value {
            font-size: 1.5em;
            font-weight: bold;
            color: #28a745;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 30px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            padding: 60px;
        }

        .spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            color: #c00;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
            border: 2px solid #fcc;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
            border: 2px solid #c3e6cb;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            color: white;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                text-align: center;
            }
            
            .tabs {
                flex-direction: column;
                border-radius: 20px;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <!-- Google Apps Script loader (use jsapi for standalone web app) -->
    <script src="https://apis.google.com/js/api.js?onload=initGapi"></script>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>
                <span>🚗⛽</span>
                Vehicle Fuel Management System
            </h1>
            <div class="nav-buttons">
                <!-- Home link uses the embedded script URL -->
                <a href="https://script.google.com/macros/s/AKfycbzeenJ8TsvrqdAoVXnwm8UpqwTfjDA55g7xTGz1IXrYjjYLS6endFdDmBZA2PIg4O7K/exec" class="nav-btn secondary">🏠 Home</a>
                <button class="nav-btn primary" onclick="refreshData()">🔄 Refresh</button>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" onclick="showTab('dashboard')">📊 Dashboard</button>
            <button class="tab" onclick="showTab('form')">➕ New Fuel Entry</button>
        </div>

        <!-- Dashboard Content -->
        <div id="dashboardContent" class="dashboard-content">
            <div id="statsContainer" class="stats-grid"></div>
            
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>Loading fuel data...</p>
            </div>

            <div id="error" class="error" style="display: none;"></div>

            <div id="tableContainer" class="table-container" style="display: none;">
                <table id="dataTable">
                    <thead id="tableHeader"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- Form Content -->
        <div id="formContent" class="form-content">
            <div class="form-container">
                <h2 class="form-title">New Fuel Entry Form</h2>
                
                <div id="formSuccess" class="success-message" style="display: none;"></div>
                <div id="formError" class="error" style="display: none;"></div>
                
                <form id="fuelForm" onsubmit="submitForm(event)">
                    <div class="form-grid">
                        <!-- Driver Information -->
                        <div class="form-group">
                            <label>Driver Name <span>*</span></label>
                            <input type="text" class="form-control" id="driverName" required>
                        </div>

                        <!-- Vehicle Information -->
                        <div class="form-group">
                            <label>Vehicle Registration <span>*</span></label>
                            <input type="text" class="form-control" id="vehicleReg" required list="vehiclesList">
                            <datalist id="vehiclesList"></datalist>
                        </div>

                        <div class="form-group">
                            <label>Vehicle Model <span>*</span></label>
                            <input type="text" class="form-control" id="vehicleModel" required>
                        </div>

                        <!-- Odometer Readings -->
                        <div class="form-row">
                            <div class="form-group">
                                <label>Odometer Start (km) <span>*</span></label>
                                <input type="number" class="form-control" id="odometerStart" required min="0" step="1" onchange="calculateKmTraveled()">
                            </div>
                            <div class="form-group">
                                <label>Odometer Finish (km) <span>*</span></label>
                                <input type="number" class="form-control" id="odometerFinish" required min="0" step="1" onchange="calculateKmTraveled()">
                            </div>
                        </div>

                        <!-- Km Traveled (Auto-calculated) -->
                        <div class="form-group">
                            <label>Km Traveled</label>
                            <input type="number" class="form-control" id="kmTraveled" readonly style="background-color: #f8f9fa;">
                        </div>

                        <!-- Fuel Information -->
                        <div class="form-row">
                            <div class="form-group">
                                <label>Fuel Liters <span>*</span></label>
                                <input type="number" class="form-control" id="fuelLiters" required min="0" step="0.01" onchange="calculateAmounts()">
                            </div>
                            <div class="form-group">
                                <label>Price per Liter ($) <span>*</span></label>
                                <input type="number" class="form-control" id="pricePerLiter" required min="0" step="0.01" onchange="calculateAmounts()">
                            </div>
                        </div>

                        <!-- Amount Paid (Auto-calculated) -->
                        <div class="form-group">
                            <label>Amount Paid ($)</label>
                            <input type="number" class="form-control" id="amountPaid" readonly style="background-color: #f8f9fa;">
                        </div>

                        <!-- Lubrication -->
                        <div class="form-group">
                            <label>Lubrication Type</label>
                            <select class="form-control" id="lubricationType" onchange="calculateAmounts()">
                                <option value="">None</option>
                                <option value="Engine Oil">Engine Oil</option>
                                <option value="Gearbox Oil">Gearbox Oil</option>
                                <option value="Brake Fluid">Brake Fluid</option>
                                <option value="Coolant">Coolant</option>
                                <option value="Grease">Grease</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Lubrication Cost ($)</label>
                            <input type="number" class="form-control" id="lubricationCost" min="0" step="0.01" value="0" onchange="calculateAmounts()">
                        </div>

                        <!-- Cost Center -->
                        <div class="form-group">
                            <label>Cost Center <span>*</span></label>
                            <select class="form-control" id="costCenter" required>
                                <option value="">Select Cost Center</option>
                                <option value="Onpoint Group HQ">Onpoint Group HQ</option>
                                <option value="DI Solutions">DI Solutions</option>
                                <option value="Aqua Telecoms">Aqua Telecoms</option>
                                <option value="Nkanyezi Projects">Nkanyezi Projects</option>
                                <option value="Onpoint Ontime Solutions">Onpoint Ontime Solutions</option>
                            </select>
                        </div>

                        <!-- Department -->
                        <div class="form-group">
                            <label>Department <span>*</span></label>
                            <select class="form-control" id="department" required>
                                <option value="">Select Department</option>
                                <option value="Admin">Admin</option>
                                <option value="Business Development">Business Development</option>
                                <option value="Finance & IT">Finance & IT</option>
                                <option value="Fleet">Fleet</option>
                                <option value="HR">HR</option>
                                <option value="Operations">Operations</option>
                                <option value="Procurements">Procurements</option>
                                <option value="Sales">Sales</option>
                                <option value="SHEQ">SHEQ</option>
                                <option value="Tendering">Tendering</option>
                                <option value="Warehouse">Warehouse</option>
                            </select>
                        </div>

                        <!-- Notes -->
                        <div class="form-group" style="grid-column: 1 / -1;">
                            <label>Notes</label>
                            <textarea class="form-control" id="notes" rows="3"></textarea>
                        </div>

                        <!-- Total Cost Display -->
                        <div class="form-group" style="grid-column: 1 / -1;">
                            <div class="calculated-field">
                                <label>Total Cost (Fuel + Lubrication)</label>
                                <div class="value" id="totalCostDisplay">$0.00</div>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn" id="submitBtn">Save Fuel Entry</button>
                </form>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>Last updated: <span id="lastUpdated">Never</span></p>
        </div>
    </div>

    <script>
        // Embedded Google Apps Script URL (your provided endpoint)
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzeenJ8TsvrqdAoVXnwm8UpqwTfjDA55g7xTGz1IXrYjjYLS6endFdDmBZA2PIg4O7K/exec';

        // Tab switching
        function showTab(tab) {
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(t => t.classList.remove('active'));
            
            if (tab === 'dashboard') {
                document.getElementById('dashboardContent').style.display = 'block';
                document.getElementById('formContent').style.display = 'none';
                tabs[0].classList.add('active');
                loadData(); // Refresh dashboard data when switching to dashboard
            } else {
                document.getElementById('dashboardContent').style.display = 'none';
                document.getElementById('formContent').style.display = 'block';
                tabs[1].classList.add('active');
                loadVehicles(); // Load vehicles for datalist
            }
        }

        // Initialize API and load data on page load
        window.onload = function() {
            // For standalone web app we can directly use fetch to call the script URL
            // But to match original code structure, we'll implement google.script.run mock with fetch
            setupMockGoogleScript();
            loadData();
            loadVehicles();
        };

        // Setup mock google.script.run that uses fetch to call the real Apps Script URL
        function setupMockGoogleScript() {
            window.google = window.google || {};
            window.google.script = window.google.script || {};
            window.google.script.run = {
                _successHandler: null,
                _failureHandler: null,
                withSuccessHandler: function(fn) {
                    this._successHandler = fn;
                    return this;
                },
                withFailureHandler: function(fn) {
                    this._failureHandler = fn;
                    return this;
                },
                // Mock method for getFuelData
                getFuelData: function() {
                    fetch(SCRIPT_URL + '?action=getFuelData')
                        .then(response => response.json())
                        .then(data => {
                            if (this._successHandler) this._successHandler(data);
                        })
                        .catch(err => {
                            if (this._failureHandler) this._failureHandler(err.toString());
                        });
                },
                // Mock method for getVehicles
                getVehicles: function() {
                    fetch(SCRIPT_URL + '?action=getVehicles')
                        .then(response => response.json())
                        .then(data => {
                            if (this._successHandler) this._successHandler(data);
                        })
                        .catch(err => {
                            if (this._failureHandler) this._failureHandler(err.toString());
                        });
                },
                // Mock method for saveFuelEntry
                saveFuelEntry: function(formData) {
                    fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors', // necessary for Apps Script redirects
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: new URLSearchParams({ action: 'save', ...formData })
                    })
                    .then(() => {
                        // With no-cors we cannot read response; we assume success and return a dummy result
                        // In practice you'd need to avoid no-cors to read response, but for demo we simulate
                        if (this._successHandler) this._successHandler({ success: true, submissionId: 'GSheet-' + Date.now() });
                    })
                    .catch(err => {
                        if (this._failureHandler) this._failureHandler(err.toString());
                    });
                }
            };
        }

        // Load dashboard data using fetch directly (bypass mock for reliability)
        function loadData() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('tableContainer').style.display = 'none';
            document.getElementById('error').style.display = 'none';
            
            fetch(SCRIPT_URL + '?action=getFuelData')
                .then(response => response.json())
                .then(result => displayData(result))
                .catch(error => displayError(error.toString()));
        }

        function displayData(result) {
            document.getElementById('loading').style.display = 'none';
            
            if (!result.success) {
                displayError(result.error || 'Unknown error');
                return;
            }

            document.getElementById('lastUpdated').textContent = new Date().toLocaleString();
            
            calculateStats(result.data);
            displayHeaders(result.headers);
            displayRows(result.data);
            
            document.getElementById('tableContainer').style.display = 'block';
        }

        function calculateStats(data) {
            let totalKm = 0, totalFuel = 0, totalCost = 0, totalLubeCost = 0;
            
            data.forEach(row => {
                totalKm += parseFloat(row['Km Traveled']) || 0;
                totalFuel += parseFloat(row['Fuel Liters']) || 0;
                totalCost += parseFloat(row['Total Cost']) || 0;
                totalLubeCost += parseFloat(row['Lubrication Cost']) || 0;
            });
            
            const avgKmPerLiter = totalFuel > 0 ? (totalKm / totalFuel).toFixed(2) : 0;
            const avgCostPerKm = totalKm > 0 ? (totalCost / totalKm).toFixed(2) : 0;
            
            const statsHTML = `
                <div class="stat-card">
                    <div class="stat-title">Total Entries</div>
                    <div class="stat-value">${data.length}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Total Distance</div>
                    <div class="stat-value">${Number(totalKm).toLocaleString()} <small>km</small></div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Total Fuel</div>
                    <div class="stat-value">${Number(totalFuel).toLocaleString()} <small>L</small></div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Total Cost</div>
                    <div class="stat-value">$${Number(totalCost).toFixed(2)}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Avg Efficiency</div>
                    <div class="stat-value">${avgKmPerLiter} <small>km/L</small></div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Avg Cost/km</div>
                    <div class="stat-value">$${avgCostPerKm}</div>
                </div>
            `;
            
            document.getElementById('statsContainer').innerHTML = statsHTML;
        }

        function displayHeaders(headers) {
            const thead = document.getElementById('tableHeader');
            let html = '<tr>';
            
            // Important headers to show (including new ones)
            const importantHeaders = [
                'Timestamp', 'Driver Name', 'Vehicle Registration', 'Vehicle Model',
                'Km Traveled', 'Fuel Liters', 'Total Cost', 'Cost Center', 'Department',
                'Lubrication Type', 'Drive Folder Link'
            ];
            
            headers.forEach(header => {
                if (importantHeaders.includes(header)) {
                    html += `<th>${header}</th>`;
                }
            });
            
            html += '</tr>';
            thead.innerHTML = html;
        }

        function displayRows(data) {
            const tbody = document.getElementById('tableBody');
            let html = '';

            data.forEach(row => {
                html += '<tr>';
                
                // Show important fields
                const fields = [
                    row['Timestamp'], row['Driver Name'], row['Vehicle Registration'],
                    row['Vehicle Model'], row['Km Traveled'], row['Fuel Liters'],
                    row['Total Cost'], row['Cost Center'], row['Department'],
                    row['Lubrication Type']
                ];
                
                fields.forEach(value => {
                    let displayValue = value || '';
                    if (value && !isNaN(value) && value.toString().includes('.')) {
                        // If it looks like a number with decimals, but we want to format only if it's a cost field
                        // We'll just display as is; but for Total Cost we format in data prep
                        if (typeof value === 'number' || !isNaN(parseFloat(value))) {
                            // avoid double formatting, just trust the server
                        }
                    }
                    html += `<td>${displayValue}</td>`;
                });
                
                // Drive folder link
                const driveLink = row['Drive Folder Link'];
                if (driveLink) {
                    html += `<td><a href="${driveLink}" target="_blank" class="drive-link">📁 View</a></td>`;
                } else {
                    html += '<td></td>';
                }
                
                html += '</tr>';
            });

            document.getElementById('tableBody').innerHTML = html;
        }

        function displayError(error) {
            document.getElementById('loading').style.display = 'none';
            const errorDiv = document.getElementById('error');
            errorDiv.style.display = 'block';
            errorDiv.innerHTML = `Error: ${error}<br><br><button class="nav-btn primary" onclick="loadData()">Try Again</button>`;
        }

        // Form Functions
        function calculateKmTraveled() {
            const start = parseFloat(document.getElementById('odometerStart').value) || 0;
            const finish = parseFloat(document.getElementById('odometerFinish').value) || 0;
            const kmTraveled = finish - start;
            
            if (kmTraveled >= 0) {
                document.getElementById('kmTraveled').value = kmTraveled.toFixed(1);
            } else {
                document.getElementById('kmTraveled').value = 0;
                alert('Odometer Finish must be greater than Odometer Start');
            }
        }

        function calculateAmounts() {
            const liters = parseFloat(document.getElementById('fuelLiters').value) || 0;
            const price = parseFloat(document.getElementById('pricePerLiter').value) || 0;
            const lubeCost = parseFloat(document.getElementById('lubricationCost').value) || 0;
            
            const amountPaid = liters * price;
            const totalCost = amountPaid + lubeCost;
            
            document.getElementById('amountPaid').value = amountPaid.toFixed(2);
            document.getElementById('totalCostDisplay').textContent = `$${totalCost.toFixed(2)}`;
        }

        function loadVehicles() {
            fetch(SCRIPT_URL + '?action=getVehicles')
                .then(response => response.json())
                .then(vehicles => {
                    const datalist = document.getElementById('vehiclesList');
                    datalist.innerHTML = '';
                    vehicles.forEach(v => {
                        const option = document.createElement('option');
                        option.value = v.registration;
                        option.label = `${v.registration} - ${v.model}`;
                        datalist.appendChild(option);
                    });
                })
                .catch(err => console.warn('Could not load vehicles'));
        }

        function submitForm(event) {
            event.preventDefault();
            
            // Validate km traveled
            const kmTraveled = parseFloat(document.getElementById('kmTraveled').value);
            if (kmTraveled <= 0) {
                alert('Please enter valid odometer readings');
                return;
            }
            
            // Disable submit button
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Saving...';
            
            // Prepare form data
            const formData = {
                action: 'save',
                driverName: document.getElementById('driverName').value,
                vehicleReg: document.getElementById('vehicleReg').value,
                vehicleModel: document.getElementById('vehicleModel').value,
                odometerStart: document.getElementById('odometerStart').value,
                odometerFinish: document.getElementById('odometerFinish').value,
                kmTraveled: kmTraveled,
                fuelLiters: document.getElementById('fuelLiters').value,
                pricePerLiter: document.getElementById('pricePerLiter').value,
                lubricationType: document.getElementById('lubricationType').value,
                lubricationCost: document.getElementById('lubricationCost').value || 0,
                costCenter: document.getElementById('costCenter').value,
                department: document.getElementById('department').value,
                notes: document.getElementById('notes').value
            };
            
            // Send using fetch to Apps Script (no-cors mode to avoid preflight, but we won't get response body)
            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', // necessary for Apps Script redirects to work
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams(formData)
            })
            .then(() => {
                // With no-cors, we cannot read response, but we assume success
                // Show success message to user
                submitBtn.disabled = false;
                submitBtn.textContent = 'Save Fuel Entry';
                
                const successDiv = document.getElementById('formSuccess');
                successDiv.style.display = 'block';
                successDiv.innerHTML = `✅ Fuel entry saved successfully! (Synced to Google Sheets)`;
                
                // Reset form
                document.getElementById('fuelForm').reset();
                document.getElementById('kmTraveled').value = '';
                document.getElementById('amountPaid').value = '';
                document.getElementById('totalCostDisplay').textContent = '$0.00';
                
                // Hide success message after 5 seconds
                setTimeout(() => {
                    successDiv.style.display = 'none';
                }, 5000);
                
                // Switch to dashboard after successful save
                setTimeout(() => {
                    showTab('dashboard');
                }, 2000);
            })
            .catch(error => {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Save Fuel Entry';
                
                const errorDiv = document.getElementById('formError');
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = `❌ Error: ${error}`;
            });
        }

        function refreshData() {
            loadData();
        }

        // Ensure google.script.run is mocked for compatibility with original script calls (like in loadVehicles)
        // Already called in setupMockGoogleScript.
    </script>
</body>
</html>
