<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONPOINT FLEET · advanced fuel & cost log</title>
    <!-- Google Font & Font Awesome -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- jsPDF and html2canvas for PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0a1e2f 0%, #1f4a6e 100%);
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }
        /* animated character background */
        .character-scene {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 250px;
            pointer-events: none;
            z-index: 1;
        }
        .fuel-mascot {
            position: absolute;
            bottom: 20px;
            left: 3%;
            width: 160px;
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(0 20px 15px #00000066);
        }
        .lube-character {
            position: absolute;
            bottom: 40px;
            right: 5%;
            width: 140px;
            animation: wobble 5s infinite;
        }
        .toll-character {
            position: absolute;
            top: 100px;
            right: 10%;
            width: 100px;
            animation: drive 8s infinite linear;
            opacity: 0.7;
        }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        @keyframes wobble {
            0%,100%{ transform: translateX(0) rotate(0); }
            25%{ transform: translateX(-10px) rotate(-5deg); }
            75%{ transform: translateX(10px) rotate(5deg); }
        }
        @keyframes drive {
            0% { transform: translateX(-200px) scaleX(1); }
            45% { transform: translateX(200px) scaleX(1); }
            50% { transform: translateX(200px) scaleX(-1); }
            95% { transform: translateX(-200px) scaleX(-1); }
            100% { transform: translateX(-200px) scaleX(1); }
        }

        /* main card */
        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 1.5rem;
        }
        .card {
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6);
            padding: 2rem;
            border: 1px solid rgba(255,255,255,0.6);
        }
        .card.full-width {
            grid-column: span 2;
        }

        /* header */
        .logo-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .badge {
            background: #0e2f44;
            color: white;
            font-weight: 700;
            font-size: 1.6rem;
            padding: 0.3rem 1.8rem 0.3rem 2rem;
            border-radius: 60px;
            letter-spacing: -0.5px;
            box-shadow: -6px 6px 0 #7aa7c9;
        }
        .badge i {
            margin-right: 12px;
            color: #fedb9f;
        }
        .sheet-id {
            background: #edf5fb;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            font-size: 0.85rem;
            color: #0e3a55;
            font-weight: 500;
            border: 1px solid white;
            margin-left: auto;
        }

        /* form grids */
        .form-grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.2rem;
            margin-bottom: 1.5rem;
        }
        .form-grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.2rem;
            margin-bottom: 1.5rem;
        }
        .field {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        .field label {
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: #1b4b6e;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .field input, .field select, .field textarea {
            background: white;
            border: 2px solid #d0e2f2;
            border-radius: 18px;
            padding: 0.8rem 1.2rem;
            font-size: 0.95rem;
            font-weight: 500;
            color: #102b3f;
            transition: 0.2s;
        }
        .field input:focus, .field select:focus {
            border-color: #2c7da0;
            box-shadow: 0 8px 18px -12px #1e4f6e;
        }

        /* cost sections */
        .cost-section {
            background: #e8f1f9;
            border-radius: 28px;
            padding: 1.5rem;
            margin: 1.2rem 0;
        }
        .section-title {
            font-weight: 700;
            color: #0c3e5e;
            margin-bottom: 1.2rem;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .inline-cost {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 1rem;
            align-items: end;
        }
        .add-btn {
            background: #1d6f94;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 0.8rem 1.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            height: fit-content;
        }
        .add-btn:hover {
            background: #0e5c80;
        }

        /* totals panel */
        .totals-panel {
            background: linear-gradient(135deg, #0f3348 0%, #1b5577 100%);
            border-radius: 30px;
            padding: 1.8rem;
            margin: 1.5rem 0;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            color: white;
            box-shadow: 0 15px 25px -10px #061b28;
        }
        .total-item {
            text-align: center;
        }
        .total-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            opacity: 0.7;
            letter-spacing: 0.5px;
        }
        .total-value {
            font-size: 1.9rem;
            font-weight: 700;
            line-height: 1.2;
        }
        .total-value small {
            font-size: 0.9rem;
            font-weight: 400;
            opacity: 0.8;
        }

        /* action buttons */
        .action-bar {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 1.8rem;
        }
        .btn {
            border: none;
            border-radius: 50px;
            padding: 1rem 2rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.15s;
            background: white;
            color: #0f3348;
            border: 2px solid #c5dff2;
        }
        .btn-primary {
            background: #fedb9f;
            border-color: #feca7a;
            color: #0f2a3b;
            font-weight: 700;
        }
        .btn-primary:hover {
            background: #ffd28c;
            transform: scale(1.02);
        }
        .btn-success {
            background: #1e7920;
            border-color: #1a9e3a;
            color: white;
        }
        .btn-success:hover {
            background: #166318;
        }

        .toll-entry {
            background: white;
            border-radius: 20px;
            padding: 1rem;
            margin-bottom: 0.8rem;
            display: grid;
            grid-template-columns: 1fr 1fr 0.8fr 0.5fr auto;
            gap: 0.8rem;
            align-items: center;
            border: 1px solid #bcd6ec;
        }
        .remove-toll {
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 0.4rem 1rem;
            cursor: pointer;
        }
        .response-message {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 50px;
            font-weight: 600;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="character-scene">
        <div class="fuel-mascot">
            <svg viewBox="0 0 120 120">
                <circle cx="60" cy="60" r="50" fill="#FEDB9F"/>
                <circle cx="40" cy="45" r="8" fill="white"/>
                <circle cx="80" cy="45" r="8" fill="white"/>
                <circle cx="42" cy="47" r="4" fill="#274873"/>
                <circle cx="78" cy="47" r="4" fill="#274873"/>
                <path d="M50 70 Q60 85, 70 70" stroke="#274873" stroke-width="5" fill="none"/>
                <rect x="30" y="90" width="60" height="18" fill="#457b9d" rx="9"/>
                <text x="48" y="106" font-size="14" fill="white" font-weight="bold">⛽</text>
            </svg>
        </div>
        <div class="lube-character">
            <svg viewBox="0 0 100 100">
                <path d="M30 40 L70 40 L80 70 L20 70 Z" fill="#a5d8ff"/>
                <circle cx="35" cy="35" r="12" fill="#74c0fc"/>
                <circle cx="65" cy="35" r="12" fill="#74c0fc"/>
                <text x="42" y="42" fill="white" font-size="16">🛢️</text>
            </svg>
        </div>
        <div class="toll-character">
            <svg viewBox="0 0 80 40">
                <rect x="10" y="10" width="60" height="20" fill="#ffd966" rx="5"/>
                <circle cx="25" cy="35" r="8" fill="#333"/>
                <circle cx="55" cy="35" r="8" fill="#333"/>
                <text x="30" y="25" fill="#333" font-size="12">🚦</text>
            </svg>
        </div>
    </div>

    <div class="dashboard">
        <!-- MAIN FORM CARD -->
        <div class="card">
            <div class="logo-row">
                <div class="badge"><i class="fas fa-gas-pump"></i> ONPOINT FLEET</div>
                <div class="sheet-id"><i class="fas fa-file-excel"></i> SHEET: Fuel Entries</div>
            </div>

            <form id="fuelForm">
                <!-- Basic Info -->
                <div class="form-grid-3">
                    <div class="field"><label><i class="fas fa-user"></i>Driver</label><input type="text" id="driverName" required></div>
                    <div class="field"><label><i class="fas fa-calendar"></i>Date</label><input type="date" id="logDate" required></div>
                    <div class="field"><label><i class="fas fa-tag"></i>Vehicle</label><input type="text" id="vehicleReg" placeholder="Reg number"></div>
                </div>

                <!-- Odometer -->
                <div class="form-grid-2">
                    <div class="field"><label><i class="fas fa-tachometer-alt"></i>Odo start (km)</label><input type="number" id="odoStart" step="0.1" required></div>
                    <div class="field"><label><i class="fas fa-flag-checkered"></i>Odo finish (km)</label><input type="number" id="odoFinish" step="0.1" required></div>
                </div>

                <!-- Fuel Section with Price per Liter -->
                <div class="cost-section">
                    <div class="section-title"><i class="fas fa-oil-can"></i> FUEL TRANSACTION</div>
                    <div class="form-grid-3">
                        <div class="field"><label>Fuel type</label>
                            <select id="fuelType" required><option value="">Select</option><option value="Petrol">Petrol</option><option value="Diesel">Diesel</option></select>
                        </div>
                        <div class="field"><label>Price per liter (R)</label><input type="number" id="pricePerLiter" step="0.01" min="0" required></div>
                        <div class="field"><label>Liters</label><input type="number" id="fuelLiters" step="0.01" min="0" required></div>
                    </div>
                    <div style="text-align:right; font-weight:600; margin-top:0.8rem;">⛽ Fuel total: R<span id="fuelTotalDisplay">0.00</span></div>
                </div>

                <!-- Lubrication Cost -->
                <div class="cost-section">
                    <div class="section-title"><i class="fas fa-oil-can"></i> LUBRICATION / FLUIDS (with cost)</div>
                    <div class="form-grid-3">
                        <div class="field"><label>Lube type</label>
                            <select id="lubeType">
                                <option value="Engine Oil">Engine oil</option><option value="Brake fluid">Brake fluid</option>
                                <option value="Coolant">Coolant</option><option value="Transmission oil">Transmission oil</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="field"><label>Quantity (L)</label><input type="number" id="lubeQty" step="0.1" min="0" value="0"></div>
                        <div class="field"><label>Total cost (R)</label><input type="number" id="lubeCost" step="0.01" min="0" value="0"></div>
                    </div>
                    <div style="margin-top:0.8rem;"><textarea id="lubeNotes" rows="2" placeholder="Additional notes about lubrication..."></textarea></div>
                </div>

                <!-- Cost Center & Department -->
                <div class="form-grid-2">
                    <div class="field"><label><i class="fas fa-building"></i>Cost center</label>
                        <select id="costCenter" required>
                            <option value="">Select</option>
                            <option value="Onpoint Group HQ">Onpoint Group HQ</option>
                            <option value="DI Solutions">DI Solutions</option>
                            <option value="Aqua Telecoms">Aqua Telecoms</option>
                            <option value="Nkanyezi Projects">Nkanyezi Projects</option>
                            <option value="Onpoint Ontime Solutions">Onpoint Ontime Solutions</option>
                        </select>
                    </div>
                    <div class="field"><label><i class="fas fa-users"></i>Department</label>
                        <select id="department" required>
                            <option value="">Select</option>
                            <option value="Admin">Admin</option><option value="Business Development">Business Development</option>
                            <option value="Finance & IT">Finance & IT</option><option value="Fleet Management">Fleet Management</option>
                            <option value="HR">HR</option><option value="Operations">Operations</option>
                            <option value="Procurements">Procurements</option><option value="Sales">Sales</option>
                            <option value="SHEQ">SHEQ</option><option value="Tendering">Tendering</option>
                            <option value="Warehouse">Warehouse</option>
                        </select>
                    </div>
                </div>

                <!-- Toll Gates Dynamic Section -->
                <div class="cost-section">
                    <div class="section-title"><i class="fas fa-road"></i> TOLL GATE COSTS</div>
                    <div id="tollContainer"></div>
                    <button type="button" class="add-btn" id="addTollBtn"><i class="fas fa-plus"></i> Add toll gate</button>
                </div>

                <!-- GRAND TOTAL PANEL -->
                <div class="totals-panel" id="totalsPanel">
                    <div class="total-item"><span class="total-label">km travelled</span><div class="total-value" id="kmTraveled">0.0</div></div>
                    <div class="total-item"><span class="total-label">km/liter</span><div class="total-value" id="kmPerLiter">0.00</div></div>
                    <div class="total-item"><span class="total-label">fuel cost</span><div class="total-value" id="fuelCostTotal">R0</div></div>
                    <div class="total-item"><span class="total-label">TOTAL PAID</span><div class="total-value" id="grandTotalPaid">R0</div></div>
                </div>

                <!-- hidden field for sheet ID -->
                <input type="hidden" id="sheetId" value="1SnhLTWgzJfkKNmIvtj8uwa-8x7TsnRtqkfX3deEuHIQ">
                
                <!-- Action Buttons -->
                <div class="action-bar">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-cloud-upload-alt"></i> SUBMIT TO SHEETS</button>
                    <button type="button" class="btn" id="pdfDownloadBtn"><i class="fas fa-file-pdf"></i> PDF REPORT</button>
                    <button type="button" class="btn" id="emailPdfBtn"><i class="fas fa-envelope"></i> EMAIL PDF</button>
                </div>
                <div id="submitResponse" class="response-message"></div>
            </form>
        </div>

        <!-- RIGHT PANEL: SUMMARY & PREVIEW (optional) -->
        <div class="card">
            <h3 style="color:#0f3348; margin-bottom:1.5rem;"><i class="fas fa-chart-pie"></i> TRIP SUMMARY</h3>
            <div style="background:#edf5fb; border-radius:30px; padding:1.5rem;">
                <div style="display:grid; gap:1rem;">
                    <div><i class="fas fa-gas-pump"></i> Fuel efficiency: <strong id="summaryEfficiency">-</strong></div>
                    <div><i class="fas fa-wrench"></i> Lube cost: <strong id="summaryLube">R0.00</strong></div>
                    <div><i class="fas fa-toll"></i> Toll total: <strong id="summaryToll">R0.00</strong></div>
                    <hr>
                    <div style="font-size:1.5rem; font-weight:700;">TOTAL: <span id="summaryTotal">R0.00</span></div>
                </div>
            </div>
            <div style="margin-top:2rem;">
                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 100'%3E%3Ctext x='10' y='30' font-size='14' fill='%23333'%3EOnpoint Group - Fleet Management%3C/text%3E%3Ctext x='10' y='60' font-size='10' fill='%23666'%3EAccurate logging since 2026%3C/text%3E%3C/svg%3E" style="width:100%; opacity:0.5;">
            </div>
        </div>
    </div>

    <script>
        (function() {
            // DOM elements
            const odoStart = document.getElementById('odoStart');
            const odoFinish = document.getElementById('odoFinish');
            const fuelLiters = document.getElementById('fuelLiters');
            const pricePerLiter = document.getElementById('pricePerLiter');
            const lubeCost = document.getElementById('lubeCost');
            const fuelTotalDisplay = document.getElementById('fuelTotalDisplay');
            const kmTraveledSpan = document.getElementById('kmTraveled');
            const kmPerLiterSpan = document.getElementById('kmPerLiter');
            const fuelCostTotalSpan = document.getElementById('fuelCostTotal');
            const grandTotalSpan = document.getElementById('grandTotalPaid');
            const summaryLube = document.getElementById('summaryLube');
            const summaryToll = document.getElementById('summaryToll');
            const summaryTotal = document.getElementById('summaryTotal');
            const summaryEfficiency = document.getElementById('summaryEfficiency');
            const tollContainer = document.getElementById('tollContainer');
            const addTollBtn = document.getElementById('addTollBtn');
            
            let tollEntries = [];

            // Set today's date
            document.getElementById('logDate').value = new Date().toISOString().split('T')[0];

            // Update all calculations
            function updateTotals() {
                const start = parseFloat(odoStart.value) || 0;
                const finish = parseFloat(odoFinish.value) || 0;
                const liters = parseFloat(fuelLiters.value) || 0;
                const price = parseFloat(pricePerLiter.value) || 0;
                const lube = parseFloat(lubeCost.value) || 0;
                
                // Fuel total
                const fuelTotal = liters * price;
                fuelTotalDisplay.innerText = fuelTotal.toFixed(2);
                
                // KM travelled
                const km = (finish > start) ? finish - start : 0;
                kmTraveledSpan.innerText = km.toFixed(1);
                
                // KM per liter
                const kmPerL = (liters > 0 && km > 0) ? km / liters : 0;
                kmPerLiterSpan.innerText = kmPerL.toFixed(2);
                summaryEfficiency.innerText = kmPerL.toFixed(2) + ' km/L';
                
                // Fuel cost total display
                fuelCostTotalSpan.innerText = 'R' + fuelTotal.toFixed(2);
                
                // Toll total
                const tollTotal = tollEntries.reduce((sum, entry) => sum + (parseFloat(entry.cost) || 0), 0);
                summaryToll.innerText = 'R' + tollTotal.toFixed(2);
                
                // Grand total (fuel + lube + toll)
                const grandTotal = fuelTotal + lube + tollTotal;
                grandTotalSpan.innerText = 'R' + grandTotal.toFixed(2);
                summaryLube.innerText = 'R' + lube.toFixed(2);
                summaryTotal.innerText = 'R' + grandTotal.toFixed(2);
            }

            // Add toll gate entry
            function addTollRow(tollData = { name: '', cost: 0 }) {
                const index = tollEntries.length;
                const div = document.createElement('div');
                div.className = 'toll-entry';
                div.innerHTML = `
                    <input type="text" placeholder="Toll name" class="toll-name" value="${tollData.name}">
                    <input type="number" step="0.01" placeholder="Cost (R)" class="toll-cost" value="${tollData.cost}">
                    <button type="button" class="remove-toll"><i class="fas fa-trash"></i> Remove</button>
                `;
                const nameInput = div.querySelector('.toll-name');
                const costInput = div.querySelector('.toll-cost');
                const removeBtn = div.querySelector('.remove-toll');
                
                nameInput.addEventListener('input', () => {
                    tollEntries[index].name = nameInput.value;
                    updateTotals();
                });
                costInput.addEventListener('input', () => {
                    tollEntries[index].cost = parseFloat(costInput.value) || 0;
                    updateTotals();
                });
                removeBtn.addEventListener('click', () => {
                    div.remove();
                    tollEntries.splice(index, 1);
                    // Re-index remaining entries
                    document.querySelectorAll('.toll-entry').forEach((el, i) => {
                        const nameIn = el.querySelector('.toll-name');
                        const costIn = el.querySelector('.toll-cost');
                        nameIn.removeEventListener('input', updateTotals);
                        costIn.removeEventListener('input', updateTotals);
                        // Re-attach with correct index
                        nameIn.addEventListener('input', () => {
                            tollEntries[i].name = nameIn.value;
                            updateTotals();
                        });
                        costIn.addEventListener('input', () => {
                            tollEntries[i].cost = parseFloat(costIn.value) || 0;
                            updateTotals();
                        });
                    });
                    updateTotals();
                });
                
                tollContainer.appendChild(div);
                tollEntries.push({ name: tollData.name, cost: parseFloat(tollData.cost) || 0 });
                updateTotals();
            }

            addTollBtn.addEventListener('click', () => addTollRow());

            // Add listeners for calculation
            [odoStart, odoFinish, fuelLiters, pricePerLiter, lubeCost].forEach(el => 
                el.addEventListener('input', updateTotals)
            );

            // Initial update
            updateTotals();

            // Submit to Google Sheets
            document.getElementById('fuelForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                
                // Gather all data
                const driver = document.getElementById('driverName').value;
                const date = document.getElementById('logDate').value;
                const vehicle = document.getElementById('vehicleReg').value;
                const start = parseFloat(odoStart.value);
                const finish = parseFloat(odoFinish.value);
                const fuelType = document.getElementById('fuelType').value;
                const price = parseFloat(pricePerLiter.value);
                const liters = parseFloat(fuelLiters.value);
                const fuelTotal = liters * price;
                const lubeType = document.getElementById('lubeType').value;
                const lubeQty = parseFloat(document.getElementById('lubeQty').value) || 0;
                const lubeTotal = parseFloat(lubeCost.value) || 0;
                const lubeNotes = document.getElementById('lubeNotes').value;
                const costCenter = document.getElementById('costCenter').value;
                const department = document.getElementById('department').value;
                
                // Toll data
                const tolls = tollEntries.map(t => `${t.name}:R${t.cost.toFixed(2)}`).join('; ');
                const tollTotal = tollEntries.reduce((sum, t) => sum + t.cost, 0);
                
                const km = finish - start;
                const kmPerL = liters > 0 ? km / liters : 0;
                const grandTotal = fuelTotal + lubeTotal + tollTotal;
                
                const payload = {
                    sheetId: document.getElementById('sheetId').value,
                    timestamp: new Date().toISOString(),
                    driver, date, vehicle,
                    odoStart: start, odoFinish: finish,
                    fuelType, pricePerLiter: price, fuelLiters: liters, fuelTotal,
                    lubrication: `${lubeType} ${lubeQty}L cost R${lubeTotal} (${lubeNotes})`,
                    lubeCost: lubeTotal,
                    tolls, tollTotal,
                    costCenter, department,
                    kmTraveled: km, kmPerLiter: kmPerL, grandTotal
                };
                
                const scriptURL = 'https://script.google.com/macros/s/AKfycbwfjaWojwcICJJKBgkJdt3f1anW8_SjJsQMf6My2khsVpSMhR3buG30Tb1STYa5cDs3/exec';
                
                document.getElementById('submitResponse').innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Submitting...';
                
                try {
                    await fetch(scriptURL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    document.getElementById('submitResponse').innerHTML = '<span style="color:#0f6d31;">✅ Successfully logged to Google Sheets</span>';
                } catch (error) {
                    document.getElementById('submitResponse').innerHTML = '<span style="color:#b13e3e;">❌ Submission failed</span>';
                }
            });

            // PDF Generation
            window.jsPDF = window.jspdf.jsPDF;
            document.getElementById('pdfDownloadBtn').addEventListener('click', function() {
                const doc = new jsPDF();
                
                // Build PDF content
                doc.setFontSize(20);
                doc.text('ONPOINT GROUP - FUEL LOG REPORT', 20, 20);
                doc.setFontSize(12);
                doc.text(`Driver: ${document.getElementById('driverName').value || 'N/A'}`, 20, 40);
                doc.text(`Date: ${document.getElementById('logDate').value}`, 20, 50);
                doc.text(`Vehicle: ${document.getElementById('vehicleReg').value || 'N/A'}`, 20, 60);
                doc.text(`Odometer: ${odoStart.value || 0} km → ${odoFinish.value || 0} km`, 20, 70);
                doc.text(`Distance: ${kmTraveledSpan.innerText} km`, 20, 80);
                doc.text(`Fuel: ${fuelLiters.value || 0} L × R${pricePerLiter.value || 0} = R${fuelTotalDisplay.innerText}`, 20, 90);
                doc.text(`Lubrication cost: R${lubeCost.value || 0}`, 20, 100);
                doc.text(`Toll gates: ${tollEntries.length} entries total R${summaryToll.innerText.replace('R','')}`, 20, 110);
                doc.text(`GRAND TOTAL PAID: R${grandTotalSpan.innerText.replace('R','')}`, 20, 130);
                doc.text(`Cost center: ${document.getElementById('costCenter').value} / ${document.getElementById('department').value}`, 20, 150);
                
                doc.save(`fuel_log_${document.getElementById('logDate').value}.pdf`);
            });

            // Email PDF (dummy - opens mail client)
            document.getElementById('emailPdfBtn').addEventListener('click', function() {
                const subject = `Fuel Log Report ${document.getElementById('logDate').value}`;
                const body = `Please find attached the fuel log report.\n\nTotal paid: ${grandTotalSpan.innerText}`;
                window.location.href = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
            });

        })();
    </script>
</body>
</html>
