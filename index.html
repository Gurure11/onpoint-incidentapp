<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>OnPoint Fleet · advanced accident report</title>
    <!-- Font & icons (Font Awesome & Google Font) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #f0f5fe 0%, #e9f0fa 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .report-card {
            max-width: 750px;
            width: 100%;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 42px;
            box-shadow: 0 25px 50px -12px rgba(0,20,60,0.35), inset 0 1px 2px rgba(255,255,255,0.7);
            padding: 2rem 1.8rem;
            border: 1px solid rgba(255,255,255,0.5);
            transition: all 0.2s ease;
        }
        h1 {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 1.9rem;
            letter-spacing: -0.02em;
            color: #0b1f3b;
            margin-bottom: 0.2rem;
        }
        h1 i {
            background: #1a3b5d;
            color: white;
            padding: 12px;
            border-radius: 24px;
            box-shadow: 0 10px 18px -8px #1a3b5d70;
            font-size: 1.5rem;
        }
        .subhead {
            font-size: 1rem;
            color: #2f4b74;
            font-weight: 500;
            margin-left: 12px;
            margin-bottom: 2rem;
            border-left: 4px solid #2d7aff;
            padding-left: 16px;
            background: rgba(45, 122, 255, 0.04);
            border-radius: 0 12px 12px 0;
        }
        .form-grid {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .two-cols {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .two-cols > div {
            flex: 1 1 180px;
        }
        .input-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .input-field label {
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: #1f3a60;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .input-field label i {
            color: #2d7aff;
            width: 20px;
            font-size: 1rem;
        }
        .input-field input, .input-field select, .input-field textarea {
            background: white;
            border: 1.5px solid #dbe3f0;
            border-radius: 20px;
            padding: 15px 20px;
            font-size: 1rem;
            font-weight: 500;
            color: #0b1f3b;
            outline: none;
            transition: all 0.2s;
            box-shadow: 0 4px 10px -5px rgba(0,0,0,0.02);
        }
        .input-field input:focus, .input-field select:focus, .input-field textarea:focus {
            border-color: #2d7aff;
            box-shadow: 0 8px 18px -10px #2d7aff, 0 0 0 4px rgba(45,122,255,0.15);
        }
        .input-field textarea {
            min-height: 90px;
            resize: vertical;
        }
        .yes-no-group {
            display: flex;
            gap: 24px;
            align-items: center;
            background: #f4f9ff;
            border-radius: 30px;
            padding: 10px 20px;
            border: 1px solid #d2e0f5;
        }
        .yes-no-group label {
            font-weight: 500;
            text-transform: none;
            font-size: 1rem;
            color: #10345e;
            gap: 6px;
        }
        .yes-no-group input[type="radio"] {
            accent-color: #1e4f8a;
            width: 18px;
            height: 18px;
            margin-right: 4px;
        }
        .photo-upload-area {
            background: #f1f7ff;
            border-radius: 28px;
            padding: 1.8rem 1.2rem;
            border: 2px dashed #9bb8f0;
            text-align: center;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            margin-top: 0.5rem;
            position: relative;
        }
        .photo-upload-area:hover {
            background: #e3edff;
            border-color: #2d7aff;
        }
        .photo-upload-area i {
            font-size: 3rem;
            color: #2d7aff;
            opacity: 0.8;
            margin-bottom: 0.5rem;
        }
        .photo-upload-area .upload-text {
            font-weight: 700;
            font-size: 1.1rem;
            color: #103056;
        }
        .photo-upload-area .upload-hint {
            font-size: 0.85rem;
            color: #476b9f;
            margin-top: 6px;
        }
        #fileInput {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        .image-preview-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 15px;
            align-items: center;
        }
        .preview-thumb {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            object-fit: cover;
            border: 3px solid white;
            box-shadow: 0 10px 18px -10px #1e3a5f;
        }
        .file-name-badge {
            background: #ffffffd0;
            border-radius: 40px;
            padding: 8px 18px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #092033;
            box-shadow: 0 4px 12px #d4e2fc;
            backdrop-filter: blur(2px);
        }
        .datetime-row {
            display: flex;
            flex-direction: row;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .datetime-row .input-field {
            flex: 1 1 160px;
        }
        .submit-btn {
            background: #0a1f38;
            border: none;
            border-radius: 50px;
            padding: 1.3rem 1.8rem;
            color: white;
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 2rem 0 0.8rem;
            border: 1px solid #2d4e7b;
            box-shadow: 0 20px 35px -12px #0f2542;
        }
        .submit-btn:hover {
            background: #123456;
            transform: scale(1.02);
            box-shadow: 0 28px 40px -12px #0f1e33;
        }
        .submit-btn i {
            font-size: 1.6rem;
        }
        .info-note {
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #eef5ffb0;
            border-radius: 30px;
            padding: 12px 18px;
            color: #1f3d66;
            font-weight: 500;
            border: 1px solid #ffffff;
        }
        .info-note i {
            color: #ff7b2d;
        }
        footer {
            text-align: center;
            margin-top: 20px;
            color: #2a4c7a;
            font-weight: 400;
            opacity: 0.9;
        }
        hr {
            border: 1px solid #c9d9f0;
            margin: 0.5rem 0 1rem;
            opacity: 0.4;
        }
        @media (max-width: 480px) {
            .report-card { padding: 1.5rem 1.2rem; border-radius: 32px; }
            h1 { font-size: 1.6rem; }
            .submit-btn { font-size: 1.2rem; padding: 1.1rem; }
        }
    </style>
</head>
<body>
    <div class="report-card">
        <h1>
            <i class="fas fa-truck"></i> 
            OnPoint Fleet · ACE
        </h1>
        <div class="subhead">
            <i class="fas fa-clipboard-list" style="margin-right: 8px;"></i> complete accident report (with police & judgement)
        </div>

        <form id="accidentForm" class="form-grid">
            <!-- date & time -->
            <div class="datetime-row">
                <div class="input-field">
                    <label><i class="fas fa-calendar-alt"></i> Date</label>
                    <input type="date" id="accidentDate" name="accidentDate" required>
                </div>
                <div class="input-field">
                    <label><i class="fas fa-clock"></i> Time</label>
                    <input type="time" id="accidentTime" name="accidentTime" value="14:30" required>
                </div>
            </div>

            <!-- Vehicle reg + location row -->
            <div class="two-cols">
                <div class="input-field">
                    <label><i class="fas fa-car"></i> Vehicle reg. number</label>
                    <input type="text" id="vehicleReg" placeholder="ABC-1234" value="FLEET-408" required>
                </div>
                <div class="input-field">
                    <label><i class="fas fa-map-pin"></i> Location / street</label>
                    <input type="text" id="location" placeholder="e.g., I-95 mile 42" value="Downtown Ave & 5th St" required>
                </div>
            </div>

            <!-- Accident type + unit / driver row (two-cols) -->
            <div class="two-cols">
                <div class="input-field">
                    <label><i class="fas fa-tag"></i> Accident type</label>
                    <select id="accidentType" required>
                        <option value="" disabled selected>– select –</option>
                        <option value="Rear-end" selected>Rear-end collision</option>
                        <option value="Side-impact">Side-impact / T-bone</option>
                        <option value="Rollover">Rollover / jackknife</option>
                        <option value="Single-vehicle">Single vehicle</option>
                        <option value="Other">Other / pedestrian</option>
                    </select>
                </div>
                <div class="input-field">
                    <label><i class="fas fa-id-card"></i> Unit #</label>
                    <input type="text" id="unitNumber" placeholder="e.g. 408" value="408" required>
                </div>
            </div>

            <!-- Driver name + phone -->
            <div class="two-cols">
                <div class="input-field">
                    <label><i class="fas fa-user"></i> Driver name</label>
                    <input type="text" id="driverName" placeholder="Full name" value="James Keller" required>
                </div>
                <div class="input-field">
                    <label><i class="fas fa-phone-alt"></i> Driver phone</label>
                    <input type="tel" id="driverPhone" placeholder="(555) 123-4567" value="+1 555 321 7890" required>
                </div>
            </div>

            <!-- Description field (full width) -->
            <div class="input-field">
                <label><i class="fas fa-file-signature"></i> Description</label>
                <textarea id="description" placeholder="Describe damages, injuries, weather …" required>Front bumper crushed, airbags deployed. Slight rain. Other driver exchanged info.</textarea>
            </div>

            <!-- other parties -->
            <div class="input-field">
                <label><i class="fas fa-car-crash"></i> Other parties involved</label>
                <input type="text" id="otherParties" placeholder="e.g. Toyota Camry, ABC123" value="Honda CR-V, plate 7GHJ432">
            </div>

            <!-- ========== NEW FIELDS (police / metro / judgement) ========== -->
            <hr>
            <div style="font-weight: 600; color: #0f2d55; margin-bottom: 8px;"><i class="fas fa-gavel" style="margin-right: 8px;"></i>OFFICIAL / POLICE INFORMATION</div>

            <!-- Reported to Metro (yes/no) -->
            <div class="input-field">
                <label><i class="fas fa-building"></i> Reported to Metro</label>
                <div class="yes-no-group">
                    <label><input type="radio" name="reportedMetro" value="Yes" checked> Yes</label>
                    <label><input type="radio" name="reportedMetro" value="No"> No</label>
                </div>
            </div>

            <!-- Officer's name + cell -->
            <div class="two-cols">
                <div class="input-field">
                    <label><i class="fas fa-user-shield"></i> Officer name</label>
                    <input type="text" id="officerName" placeholder="e.g. M. Davis" value="Officer M. Davis">
                </div>
                <div class="input-field">
                    <label><i class="fas fa-mobile-alt"></i> Officer cell</label>
                    <input type="tel" id="officerPhone" placeholder="(555) 987-6543" value="555-987-6543">
                </div>
            </div>

            <!-- Drunken driving involved (yes/no) -->
            <div class="input-field">
                <label><i class="fas fa-wine-bottle"></i> Drunken driving involved</label>
                <div class="yes-no-group">
                    <label><input type="radio" name="drunkenDriving" value="Yes"> Yes</label>
                    <label><input type="radio" name="drunkenDriving" value="No" checked> No</label>
                </div>
            </div>

            <!-- Incident police report number -->
            <div class="input-field">
                <label><i class="fas fa-hashtag"></i> Incident police report #</label>
                <input type="text" id="policeReportNo" placeholder="e.g. 23-78901" value="PD-2309-452">
            </div>

            <!-- Officer's immediate judgement (at fault? yes/no) -->
            <div class="input-field">
                <label><i class="fas fa-balance-scale"></i> Officer's judgement (are you at fault?)</label>
                <div class="yes-no-group">
                    <label><input type="radio" name="atFault" value="Yes"> Yes, at fault</label>
                    <label><input type="radio" name="atFault" value="No" checked> No, not at fault</label>
                </div>
            </div>

            <hr>
            <!-- PHOTO UPLOAD -->
            <div class="photo-upload-area" id="dropZone">
                <i class="fas fa-cloud-upload-alt"></i>
                <div class="upload-text">attach accident image</div>
                <div class="upload-hint">tap to browse or drag — high quality</div>
                <input type="file" id="fileInput" accept="image/*" capture="environment">
            </div>

            <!-- live preview of selected image & name -->
            <div id="previewContainer" class="image-preview-row" style="display: none;">
                <img id="imagePreview" class="preview-thumb" src="#" alt="preview">
                <span id="fileNameDisplay" class="file-name-badge"><i class="far fa-image"></i> accident.jpg</span>
                <button type="button" id="clearImageBtn" style="background: none; border:none; color:#b00; margin-left:auto; font-size:1.5rem; cursor:pointer;"><i class="fas fa-times-circle"></i></button>
            </div>
            <input type="hidden" id="imageBase64" value="">

            <!-- submit button -->
            <button type="submit" class="submit-btn">
                <i class="fas fa-paper-plane"></i> email full report + image
            </button>
            <div class="info-note">
                <i class="fas fa-shield-alt"></i> All data + picture included (base64 in body) · send via mail app
            </div>
        </form>
        <footer>
            <i class="fas fa-check-circle" style="color: #249c6b;"></i> OnPoint fleet – safety first (v2 with police fields)
        </footer>
    </div>

    <script>
        (function() {
            // DOM elements
            const fileInput = document.getElementById('fileInput');
            const dropZone = document.getElementById('dropZone');
            const previewContainer = document.getElementById('previewContainer');
            const imagePreview = document.getElementById('imagePreview');
            const fileNameDisplay = document.getElementById('fileNameDisplay');
            const clearImageBtn = document.getElementById('clearImageBtn');
            const imageBase64Hidden = document.getElementById('imageBase64');
            const form = document.getElementById('accidentForm');

            let selectedFile = null;

            // --- file selection & preview + base64 ---
            function handleFileSelect(file) {
                if (!file) return;
                if (!file.type.startsWith('image/')) {
                    alert('Please select an image file (JPEG, PNG, etc.)');
                    return;
                }
                selectedFile = file;
                fileNameDisplay.innerHTML = `<i class="far fa-file-image"></i> ${file.name}`;

                const reader = new FileReader();
                reader.onload = (e) => {
                    imagePreview.src = e.target.result;
                    imageBase64Hidden.value = e.target.result;  // data url
                    previewContainer.style.display = 'flex';
                };
                reader.readAsDataURL(file);
            }

            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    handleFileSelect(e.target.files[0]);
                }
            });

            // Drag & drop
            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.style.background = '#e3edff';
                dropZone.style.borderColor = '#0a52c2';
            });
            dropZone.addEventListener('dragleave', (e) => {
                e.preventDefault();
                dropZone.style.background = '#f1f7ff';
                dropZone.style.borderColor = '#9bb8f0';
            });
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.style.background = '#f1f7ff';
                dropZone.style.borderColor = '#9bb8f0';
                if (e.dataTransfer.files.length > 0) {
                    fileInput.files = e.dataTransfer.files;
                    handleFileSelect(e.dataTransfer.files[0]);
                }
            });

            clearImageBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                selectedFile = null;
                fileInput.value = '';
                imageBase64Hidden.value = '';
                previewContainer.style.display = 'none';
                imagePreview.src = '#';
            });

            // Set today's date as default
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('accidentDate').value = today;

            // Form submit – build email body with all new fields
            form.addEventListener('submit', (e) => {
                e.preventDefault();

                // collect all fields (including radios)
                const date = document.getElementById('accidentDate').value;
                const time = document.getElementById('accidentTime').value;
                const vehicleReg = document.getElementById('vehicleReg').value;
                const location = document.getElementById('location').value;
                const accidentType = document.getElementById('accidentType').value;
                const unitNumber = document.getElementById('unitNumber').value;
                const driverName = document.getElementById('driverName').value;
                const driverPhone = document.getElementById('driverPhone').value;
                const description = document.getElementById('description').value;
                const otherParties = document.getElementById('otherParties').value;

                // Radio groups
                const reportedMetro = document.querySelector('input[name="reportedMetro"]:checked')?.value || 'Not specified';
                const officerName = document.getElementById('officerName').value || 'N/A';
                const officerPhone = document.getElementById('officerPhone').value || 'N/A';
                const drunkenDriving = document.querySelector('input[name="drunkenDriving"]:checked')?.value || 'Not specified';
                const policeReportNo = document.getElementById('policeReportNo').value || 'N/A';
                const atFault = document.querySelector('input[name="atFault"]:checked')?.value || 'Not specified';

                const imageBase64 = imageBase64Hidden.value;

                // Required fields check (simple)
                if (!date || !time || !vehicleReg || !location || !accidentType || !unitNumber || !driverName || !driverPhone || !description) {
                    alert('Please fill all required fields (marked with *).');
                    return;
                }

                // Build email body (URL encoded)
                let emailBody = `ONPOINT FLEET – COMPLETE ACCIDENT REPORT%0A%0A`;
                emailBody += `📅 DATE: ${date} at ${time}%0A`;
                emailBody += `🚗 VEHICLE REG: ${vehicleReg}%0A`;
                emailBody += `📍 LOCATION: ${location}%0A`;
                emailBody += `🚧 TYPE: ${accidentType}%0A`;
                emailBody += `🚛 UNIT: ${unitNumber} | DRIVER: ${driverName} | PHONE: ${driverPhone}%0A`;
                emailBody += `📄 DESCRIPTION: ${description}%0A`;
                emailBody += `🚙 OTHER PARTIES: ${otherParties || 'none'}%0A%0A`;

                // Police / metro section
                emailBody += `👮 OFFICIAL INFORMATION%0A`;
                emailBody += `🏛️ REPORTED TO METRO: ${reportedMetro}%0A`;
                emailBody += `🛡️ OFFICER NAME: ${officerName} | CELL: ${officerPhone}%0A`;
                emailBody += `🍷 DRUNKEN DRIVING INVOLVED: ${drunkenDriving}%0A`;
                emailBody += `📋 POLICE REPORT #: ${policeReportNo}%0A`;
                emailBody += `⚖️ OFFICER’S JUDGEMENT (AT FAULT?): ${atFault}%0A%0A`;

                // Image attachment note + base64 (if exists)
                if (imageBase64) {
                    emailBody += `📸 ACCIDENT IMAGE (base64 encoded – use to reconstruct image):%0A`;
                    // mailto length limit ~ 8192 chars; if too long, truncate and advise console.
                    if (imageBase64.length < 7000) {
                        emailBody += `${imageBase64}%0A`;
                    } else {
                        emailBody += `[IMAGE BASE64 length = ${imageBase64.length} chars – too long for mailto, open browser console to copy full base64]%0A`;
                        console.log('Full image base64:', imageBase64);
                    }
                } else {
                    emailBody += `📷 No image attached.%0A`;
                }

                emailBody += `%0A-- %0AOnPoint Fleet safety report – generated from mobile app (v2)`;

                const recipient = 'bothwell.gurure11@gmail.com';
                const subject = `🚨 Accident report - Unit ${unitNumber} / ${vehicleReg} - ${date}`;
                const mailtoLink = `mailto:${recipient}?subject=${encodeURIComponent(subject)}&body=${emailBody}`;

                window.location.href = mailtoLink;

                setTimeout(() => {
                    alert('Mail app should open. If not, please manually email the details.\nThe image base64 is in console if too long.');
                }, 300);
            });

        })();
    </script>
</body>
</html>
